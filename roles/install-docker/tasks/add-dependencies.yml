---
- name: Ensure required packages are installed
  apt:
    name:
    - ca-certificates
    - curl
- name: Create /etc/apt/keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: 0755

- name: Download Docker's official GPG key
  command: >
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc

- name: Get arch of linux
  shell: dpkg --print-architecture
  register: arch

- name: change owner ship
  command: chmod a+r /etc/apt/keyrings/docker.asc
#- name: Download Docker's official GPG key
#  get_url:
#    url: https://download.docker.com/linux/ubuntu/gpg
#    dest: /etc/apt/keyrings/docker.asc
#    mode: '0644'

- name: Add Docker APT repository
  apt_repository:
    repo: deb [arch={{ arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    state: present
    filename: /etc/apt/sources.list.d/docker

