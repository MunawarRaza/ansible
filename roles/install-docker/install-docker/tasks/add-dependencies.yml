---
- name: Create Directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: 0755
- name: Add gpg key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    keyring: /etc/apt/keyrings/docker.gpg
    state: present
- name: Get arch of linux
  shell: dpkg --print-architecture
  register: arch
- name: change owner ship
  command: chmod a+r /etc/apt/keyrings/docker.gpg
- name: Add repository
  apt_repository:
    repo: deb [arch={{ arch.stdout }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    state: present
    filename: /etc/apt/sources.list.d/docker

