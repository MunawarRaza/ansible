---
- name: Copy service file if missing
  template:
    src: node_exporter.service.j2
    dest: "{{ node_exporter_service_file }}"
    owner: root
    group: root
    mode: '0644'
  when: not service_file.stat.exists

- name: Reload daemon if service file copied
  systemd:
    daemon_reload: true
  when: not service_file.stat.exists

- name: Enable node_exporter
  systemd:
    name: "{{ node_exporter_service }}"
    enabled: true

- name: Start node_exporter
  systemd:
    name: "{{ node_exporter_service }}"
    state: started