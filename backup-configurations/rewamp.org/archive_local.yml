---
- name: Create Tar File Locally
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Archive the directory in tar.gz format
      run_once: true
      community.general.archive:
        path: "{{ LOCAL_DESTINATION_BASE_PATH }}/{{ CURRENT_DATE }}"
        dest: "{{ LOCAL_DESTINATION_BASE_PATH }}/{{ CURRENT_DATE }}.tar.gz"
        format: gz
        owner: munawar
        group: munawar
        mode: '0644'